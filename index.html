<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro de Usuario</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <div class="form-container">
        <h1>Registro de Usuario</h1>
        <form action="mailto:prueba@ejemplo.com" method="post">
            
            <div class="form-group">
                <label for="nombres">Nombres</label>
                <input type="text" id="nombres" name="nombres" placeholder="Ingrese su/s nombre/s" required minlength="3" maxlength="64">
            </div>

            <div class="form-group">
                <label for="apellidos">Apellidos</label>
                <input type="text" id="apellidos" name="apellidos" placeholder="Ingrese su/s apellido/s" required minlength="3" maxlength="64">
            </div>

            <div class="form-group">
                <label>Tipo de Documento</label>
                <div class="radio-group">
                    <label><input type="radio" name="documento" value="1"> TI</label>
                    <label><input type="radio" name="documento" value="2"> CC</label>
                    <label><input type="radio" name="documento" value="3"> NIT</label>
                </div>
            </div>

            <div class="form-group">
                <label for="doc_numero">Número de Documento</label>
                <input type="number" id="doc_numero" name="doc_numero" placeholder="Ej: 12345678" required>
            </div>

            <div class="form-group">
                <label for="direccion">Direccion</label>
                <input type="text" id="direccion" name="direccion" placeholder="EJ: Cll 34 # 27-56" required minlength="3" maxlength="64">
            </div>

            <div class="form-group">
                <label for="Tel_celular">Tel Celular</label>
                <input type="number" id="Tel_celular" name="Tel<_celular" placeholder="Ej: 321567890" required minlength="3" maxlength="64">
            </div>

            <div class="form-group">
                <label for="correo">Correo Electrónico</label>
                <input type="email" id="correo" name="correo" placeholder="usuario@correo.com" required>
            </div>

            <div class="form-group">
                <label>Hobbies</label>
                <div class="checkbox-grid">
                    <label><input type="checkbox" name="hobbies" value="deportes"> Deportes</label>
                    <label><input type="checkbox" name="hobbies" value="bailar"> Bailar</label>
                    <label><input type="checkbox" name="hobbies" value="musica"> Música</label>
                    <label><input type="checkbox" name="hobbies" value="videojuegos"> Videojuegos</label>
                </div>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Enviar</button>
                <button type="reset" class="btn-reset">Limpiar</button>
            </div>
        </form>
    </div>
</body>
</html>
